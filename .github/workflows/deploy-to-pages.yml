name: Deploy to Cloudflare Pages via GitHub Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify build output
        run: |
          echo "✅ Build completed successfully"
          echo "Generated files:"
          find dist -type f | head -20
          echo "Total files: $(find dist -type f | wc -l)"

  # Note: Cloudflare Pages will automatically deploy from the GitHub integration
  # This job serves as a build verification step only
  # Configure Cloudflare Pages to:
  # - Watch branch: main
  # - Build command: npm run build
  # - Build output directory: dist
