name: Daily Market Summary

# 毎日 日本時間 17:00(JST)= UTC 08:00 に実行
# 手動実行(workflow_dispatch)も可能にしておく
on:
  schedule:
    # cron は UTC で指定する必要がある: JST 17:00 = UTC 08:00
    # GitHubの遅延対策として8:00と8:15の2重設定（重複実行は has_changes チェックで防止）
    - cron: '0 8 * * *'   # 毎日 UTC 08:00 (JST 17:00)
    - cron: '15 8 * * *'  # 毎日 UTC 08:15 (JST 17:15) ← 遅延フォールバック
  workflow_dispatch:
    inputs:
      force_commit:
        description: '変更がなくても空コミットする(デバッグ用)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# 同時実行を防ぐ(前回の実行が走っている間に新しい実行が始まらないようにする)
concurrency:
  group: daily-market-summary
  cancel-in-progress: false

# コミット&プッシュのために書き込み権限が必要
permissions:
  contents: write

jobs:
  generate-and-commit:
    name: Generate market summary and commit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ------------------------------
      # 1. リポジトリをチェックアウト
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # プッシュ時に GITHUB_TOKEN を使うため、persist-credentials: true(デフォルト)のままにする
          fetch-depth: 1

      # ------------------------------
      # 2. Python 環境のセットアップ
      # ------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ------------------------------
      # 3. 依存パッケージをインストール
      # ------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install yfinance pandas anthropic
          fi

      # ------------------------------
      # 4. 書影画像をダウンロード（未取得分のみ）
      # ------------------------------
      - name: Download book covers
        run: |
          python download_covers.py || echo "⚠️ Some covers failed to download, continuing..."

      # ------------------------------
      # 5. 市場サマリー記事を生成
      # ------------------------------
      - name: Generate market summary
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Tokyo  # タイムゾーンをJSTに明示
        run: |
          python generate_market_summary.py

      # ------------------------------
      # 6. 変更の有無を確認
      # ------------------------------
      - name: Check for changes
        id: check
        run: |
          # src/content/blog/ 配下の新規/変更ファイルを検出
          if [ -n "$(git status --porcelain src/content/blog/)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "📝 記事の変更を検出しました:"
            git status --short src/content/blog/
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  変更はありませんでした(既に本日の記事が存在する可能性)"
          fi

      # ------------------------------
      # 7. Git の認証情報を設定してコミット&プッシュ
      # ------------------------------
      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true' || github.event.inputs.force_commit == 'true'
        env:
          TZ: Asia/Tokyo
        run: |
          # github-actions[bot] としてコミットする
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # コミット対象: 記事 + 書影（存在する場合のみ）+ books_data.json（cover_url更新分）
          git add src/content/blog/
          # public/images/books/ はファイルが存在する場合のみ追加（空ディレクトリは git add 不可）
          if [ -d "public/images/books" ] && [ -n "$(ls -A public/images/books 2>/dev/null)" ]; then
            git add public/images/books/
          fi
          # books_data.json の cover_url 更新分も追加
          git add books_data.json 2>/dev/null || true

          # 今日の日付をコミットメッセージに入れる
          REPORT_DATE=$(date +%Y-%m-%d)

          if [ "${{ github.event.inputs.force_commit }}" = "true" ] && [ -z "$(git diff --cached --name-only)" ]; then
            git commit --allow-empty -m "chore: daily market summary trigger (${REPORT_DATE})"
          else
            git commit -m "post: add market summary for ${REPORT_DATE}

          Automatically generated by GitHub Actions.
          Run: ${{ github.run_id }}"
          fi

          # リトライ付きで push(他のワークフローと競合した場合に備える)
          for i in 1 2 3; do
            if git push; then
              echo "✅ プッシュ成功"
              exit 0
            fi
            echo "⚠️  プッシュ失敗($i 回目) — リベース後に再試行"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep 3
          done
          echo "❌ プッシュに 3 回失敗しました" >&2
          exit 1

      # ------------------------------
      # 8. ログファイルをアーティファクトとして保存(失敗調査用)
      # ------------------------------
      - name: Upload log artifact
        if: always()  # 成功・失敗を問わず保存する
        uses: actions/upload-artifact@v4
        with:
          name: market-summary-log-${{ github.run_id }}
          path: |
            generate_market_summary.log
          retention-days: 14
          if-no-files-found: ignore

      # ------------------------------
      # 9. 失敗時の通知(任意: Slack 等を設定している場合)
      # ------------------------------
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily market summary generation failed. Check logs in the artifact."
          # Slack や Discord に通知したい場合は、ここに curl で Webhook を叩く処理を追加する
          # 例:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"❌ Daily market summary failed: ${{ github.run_id }}\"}" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
